<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наш магазин на карте — Sushnykoff</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Стили страницы карты */
    body {
      background: #f5f7fa;
      padding: 20px;
      margin: 0;
      min-height: 100vh;
    }

    .map-page {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Шапка страницы */
    .map-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      padding: 16px 30px;
      border-radius: 24px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      flex-wrap: wrap;
      gap: 15px;
    }

    .map-header h1 {
      color: #1a1a2e;
      font-weight: 700;
      font-size: 24px;
      margin: 0;
    }

    .map-header h1 span {
      color: #27ae60;
    }

    .map-header .back-link {
      padding: 10px 24px;
      background: #27ae60;
      color: white;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .map-header .back-link:hover {
      background: #1e8449;
    }

    /* Контейнер с картой */
    .map-container {
      background: white;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .map-container h2 {
      color: #1a1a2e;
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Сама карта */
    #map {
      width: 100%;
      height: 450px;
      border-radius: 16px;
      overflow: hidden;
    }

    /* Информация о магазине под картой */
    .shop-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 16px;
    }

    .shop-info-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #2c3e50;
    }

    .shop-info-item .icon {
      font-size: 24px;
    }

    .shop-info-item .text {
      font-size: 15px;
    }

    .shop-info-item .text strong {
      display: block;
      font-weight: 600;
      font-size: 14px;
      color: #1a1a2e;
    }

    /* Адаптация для телефонов */
    @media (max-width: 768px) {
      .map-header {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }
      .map-header h1 {
        font-size: 20px;
      }
      .map-container {
        padding: 12px;
      }
      #map {
        height: 320px;
      }
      .shop-info {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 16px;
      }
    }

    @media (max-width: 480px) {
      .map-header {
        padding: 12px 16px;
      }
      #map {
        height: 280px;
      }
    }
  </style>
</head>
<body>

<div class="map-page">
  <!-- Шапка -->
  <header class="map-header">
    <h1>🥤 <span>Sushnykoff</span></h1>
    <a href="/" class="back-link">🏠 На главную</a>
  </header>
  <!-- Навигационная цепочка -->
  <div class="breadcrumbs" id="breadcrumbs"></div>

  <!-- Карта -->
  <div class="map-container">
    <h2>📍 Наш магазин на карте</h2>
    <div id="map"></div>

    <!-- Информация о магазине -->
    <div class="shop-info">
      <div class="shop-info-item">
        <span class="icon">📍</span>
        <div class="text">
          <strong>Адрес</strong>
          г. Нальчик, ул. Владикавказкое шоссе 2
        </div>
      </div>
      <div class="shop-info-item">
        <span class="icon">🕐</span>
        <div class="text">
          <strong>График работы</strong>
          Пн-Вс 8:00 – 17:00<br>
        </div>
      </div>
      <div class="shop-info-item">
        <span class="icon">📞</span>
        <div class="text">
          <strong>Телефон</strong>
          +7 (988) 936-97-30
        </div>
      </div>
      <div class="shop-info-item">
        <span class="icon">✉️</span>
        <div class="text">
          <strong>Email</strong>
          kugotovaina@yandex.ru
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== ПОДКЛЮЧАЕМ ЯНДЕКС КАРТЫ ===== -->
<!-- ВСТАВЬТЕ СВОЙ API-КЛЮЧ ВМЕСТО YOUR_API_KEY -->
<script src="https://api-maps.yandex.ru/2.1/?apikey=f41d7146-a842-435a-b962-73d90f50c&lang=ru_RU" type="text/javascript"></script>

<script type="text/javascript">
  // ===== ИНИЦИАЛИЗАЦИЯ КАРТЫ =====
  ymaps.ready(initMap);

  function initMap() {
    // ===== КООРДИНАТЫ ВАШЕГО МАГАЗИНА =====
    // Замените эти координаты на свои!
    // Узнать координаты: https://yandex.ru/maps/ → найдите адрес → кликните правой кнопкой → "Что здесь?"
    const shopCoords = [43.484259, 43.649928]; 

    // Создаём карту
    const map = new ymaps.Map('map', {
      center: shopCoords,
      zoom: 16,
      controls: [
        'zoomControl',
        'fullscreenControl',
        'typeSelector'
      ]
    });

    // ===== ДОБАВЛЯЕМ МЕТКУ МАГАЗИНА =====
    const placemark = new ymaps.Placemark(
      shopCoords,
      {
        // Всплывающая подсказка при наведении
        hintContent: '🥤 Sushnykoff — наш магазин',
        // Балун (большое окно) при клике
        balloonContent: `
          <div style="font-family: 'Segoe UI', sans-serif; padding: 4px 0;">
            <h3 style="margin: 0 0 8px 0; color: #27ae60;">🥤 Sushnykoff</h3>
            <p style="margin: 4px 0;">
              <strong>📍 Адрес:</strong><br>
              г. Нальчик, Рынок Дубки 2/172
            </p>
            <p style="margin: 4px 0;">
              <strong>🕐 График работы:</strong><br>
              Пн-Вс 8:00 – 17:00<br>
            </p>
            <p style="margin: 4px 0;">
              <strong>📞 Телефон:</strong><br>
              +7 (988) 936-97-30     </p>
            <p style="margin: 4px 0 0 0;">
              <strong>✉️ Email:</strong><br>
              kugotovaina@yandex.ru
            </p>
          </div>
        `
      },
      {
        // Внешний вид метки
        preset: 'islands#greenCircleIcon',
        // Смещение балуна вверх, чтобы не перекрывать метку
        balloonOffset: [0, -10]
      }
    );

    // Добавляем метку на карту
    map.geoObjects.add(placemark);

    // ===== АВТОМАТИЧЕСКОЕ ОТКРЫТИЕ БАЛУНА ПРИ ЗАГРУЗКЕ =====
    setTimeout(() => {
      placemark.balloon.open();
    }, 500);

    // ===== ДОПОЛНИТЕЛЬНЫЕ НАСТРОЙКИ КАРТЫ =====
    // Плавная загрузка карты
    map.events.add('load', function() {
      console.log('✅ Карта загружена');
    });

    // Если нужно показать панораму (улицу) — раскомментируйте:
    // const panorama = new ymaps.panorama.Panorama();
    // map.setPanorama(panorama);

    // Если нужно добавить масштаб с помощью колесика мыши
    map.behaviors.enable('scrollZoom');

    // Скрываем лишние элементы управления (для более чистого вида)
    // map.controls.remove('geolocationControl');
    // map.controls.remove('searchControl');
    // map.controls.remove('trafficControl');
  }
</script>

</body>
</html>
