<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ошибка оплаты</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .fail-container {
      max-width: 600px;
      margin: 100px auto;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    .fail-container h1 { color: #e74c3c; margin-bottom: 20px; }
    .btn-home {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: #3498db;
      color: white;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="fail-container">
  <h1>❌ Оплата не удалась</h1>
  <p>Что-то пошло не так. Попробуйте ещё раз или выберите другой способ оплаты.</p>
  <a href="/" class="btn-home">🏠 Вернуться в магазин</a>
</div>
</body>
</html>
